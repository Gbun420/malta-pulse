            },
            "002": {
                cat: "Tech",
                title: "University of Malta Launches AI Ethics Research Lab",

                content: `<p>The University of Malta has officially opened a new AI Ethics Research Lab, signaling the island's commitment to responsible artificial intelligence development.</p>

                <blockquote>"We're not just building AI. We're building AI that people can trust."</blockquote>`,

            },
            "003": {

                title: "Local Startups Raise €12M in First Quarter",
                date: "March 24, 2026",
                time: "3 min",
                content: `<p>Three Maltese startups secured €12M across fintech, healthtech, and sustainable tourism.</p>`,
                meta_desc: "Maltese startups raised €12M in Q1 2026."
            },
            "004": {
                cat: "Crypto",
                title: "Malta Blockchain Regulations Attract Asian Investors",
                date: "March 24, 2026",
                time: "3 min",
                content: `<p>Malta's clear regulatory framework draws Asian crypto investment.</p>`,
                meta_desc: "Malta blockchain regulations attract Asian investors."
            },
            "005": {
                cat: "Lifestyle",
                title: "Best Hidden Beaches in Malta This Spring",
                date: "March 24, 2026",
                time: "5 min",
                content: `<p>Discover Malta's hidden coastal gems this spring.</p>`,
                meta_desc: "Hidden Malta beaches for spring."
            },
            "006": {
                cat: "Politics",
                title: "EU Digital Services Act: How Malta Adapts",
                date: "March 24, 2026",
                time: "4 min",
                content: `<p>Malta turns DSA compliance into competitive advantage.</p>`,

            },
            "007": {
                cat: "Health",
                title: "New Telemedicine Platform Launches for Gozo",
                date: "March 24, 2026",
                time: "3 min",
                content: `<p>New platform connects Gozo residents with Malta specialists via video.</p>`,
                meta_desc: "Gozo telemedicine platform launches."
            }
        };
        
        // Get article from URL
        const params = new URLSearchParams(window.location.search);
        const articleId = params.get('id') || '001';
        const article = articles[articleId];
        
        if (article) {
            document.getElementById('article-cat').textContent = article.cat;
            document.getElementById('article-cat-bc').textContent = article.cat;
            document.getElementById('article-title').textContent = article.title;
            document.getElementById('article-date').textContent = article.date;
            document.getElementById('article-time').textContent = article.time;
            document.getElementById('article-content').innerHTML = article.content;
            document.title = article.title + ' | MaltaPulse';
            document.querySelector('meta[name="description"]').setAttribute('content', article.meta_desc);
        }
        
        // Share functions
        function shareTwitter() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(document.getElementById('article-title').textContent);
            window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank');
        }
        
        function shareFacebook() {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank');
        }
        
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            event.target.textContent = 'Copied!';
            setTimeout(() => event.target.textContent = 'Copy Link', 2000);
        }
        
        // Dark mode
        const toggle = document.getElementById('dark-toggle');
        if (localStorage.getItem('malta-dark') === 'true') document.body.classList.add('dark');
        toggle?.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('malta-dark', document.body.classList.contains('dark'));
        });
    </script>
